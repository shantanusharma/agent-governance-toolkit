name: Publish Container Images

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      component:
        description: "Component to build and publish"
        required: true
        type: choice
        options:
          - all
          - trust-engine
          - policy-server
          - audit-collector
          - api-gateway
          - registry
          - relay
          - governance-sidecar
      tag:
        description: "Image tag for manual runs (default: dry-run)"
        required: false
        default: "dry-run"
      dry_run:
        description: "Build images without pushing tags or attestations to GHCR"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/agent-governance-toolkit

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: trust-engine
            dockerfile: agent-governance-python/agent-mesh/docker/Dockerfile
            context: .
            port: 8443
          - component: policy-server
            dockerfile: agent-governance-python/agent-mesh/docker/Dockerfile
            context: .
            port: 8444
          - component: audit-collector
            dockerfile: agent-governance-python/agent-mesh/docker/Dockerfile
            context: .
            port: 8445
          - component: api-gateway
            dockerfile: agent-governance-python/agent-mesh/docker/Dockerfile
            context: .
            port: 8446
          - component: registry
            dockerfile: agent-governance-python/agent-mesh/docker/Dockerfile
            context: .
            port: 8082
          - component: relay
            dockerfile: agent-governance-python/agent-mesh/docker/Dockerfile
            context: .
            port: 8083
          - component: governance-sidecar
            dockerfile: agent-governance-python/agent-os/Dockerfile.sidecar
            context: .
            port: 8081

    steps:
      - name: Check if this component should build
        id: check
        run: |
          EVENT="${{ github.event_name }}"
          SELECTED="${{ github.event.inputs.component }}"
          CURRENT="${{ matrix.component }}"
          if [ "$EVENT" = "release" ] || [ "$SELECTED" = "all" ] || [ "$SELECTED" = "$CURRENT" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping $CURRENT (selected: $SELECTED)"
          fi

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: steps.check.outputs.skip != 'true'

      - name: Set image tag
        if: steps.check.outputs.skip != 'true'
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            TAG="${RELEASE_TAG}"
            TAG="${TAG#v}"
          else
            TAG="${INPUT_TAG:-latest}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Image tag: $TAG"

      - name: Set up Docker Buildx
        if: steps.check.outputs.skip != 'true'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        if: steps.check.outputs.skip != 'true' && (github.event_name == 'release' || github.event.inputs.dry_run == 'false')
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: steps.check.outputs.skip != 'true'
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.component }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.tag }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=sha,prefix=

      - name: Build and push
        if: steps.check.outputs.skip != 'true'
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'release' || github.event.inputs.dry_run == 'false' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMPONENT=${{ matrix.component }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest build provenance
        if: steps.check.outputs.skip != 'true' && (github.event_name == 'release' || github.event.inputs.dry_run == 'false')
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.IMAGE_PREFIX }}/${{ matrix.component }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
        continue-on-error: true

      - name: Summary
        if: steps.check.outputs.skip != 'true'
        env:
          PUBLISHED: ${{ github.event_name == 'release' || github.event.inputs.dry_run == 'false' }}
        run: |
          if [ "$PUBLISHED" = "true" ]; then
            STATUS="Published"
            PULL="docker pull ${{ env.IMAGE_PREFIX }}/${{ matrix.component }}:${{ steps.tag.outputs.tag }}"
          else
            STATUS="Dry-run build"
            PULL="not pushed"
          fi
          {
            echo "### ✅ ${STATUS} \`${{ matrix.component }}\`"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Image | \`${{ env.IMAGE_PREFIX }}/${{ matrix.component }}:${{ steps.tag.outputs.tag }}\` |"
            echo "| Digest | \`${{ steps.build.outputs.digest }}\` |"
            echo "| Platforms | linux/amd64, linux/arm64 |"
            echo ""
            echo "Pull: \`${PULL}\`"
          } >> "$GITHUB_STEP_SUMMARY"
