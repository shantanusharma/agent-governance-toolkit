# Shows a policy signal when a PR is awaiting maintainer approval.
# "Maintainer" is resolved from native repo RBAC: a collaborator whose
# effective permission is `maintain` or `admin`. There is no hardcoded
# name list — granting/revoking the Maintain role is the single source
# of truth.
#
# AI-only approvals, bot approvals, and the author's own approval do NOT count.
#
# Context: PRs #357 and #362 were auto-merged without maintainer review,
# reintroducing shell=True (CWE-78) that was previously fixed.

name: "Policy: Awaiting maintainer review"

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main]
  # Re-run the gate when a review is submitted or dismissed so an approval
  # flips the check green immediately instead of waiting for a new push.
  # github.event.pull_request.number is present for both pull_request_target
  # and pull_request_review payloads, so PR resolution works for both events.
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: read

# SECURITY: pull_request_target runs in BASE context. Never checkout PR head ref.
jobs:
  check-approval:
    name: "Policy: Awaiting maintainer review"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read    # github-script calls pulls.listReviews on the PR
    steps:
      - name: Check for a maintainer (Maintain+) approval
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            // Distinct human approvers, excluding the PR author (no self-approval)
            // and any bot/service account (type !== 'User').
            const approvers = [...new Set(
              reviews
                .filter((r) => r.state === 'APPROVED' && r.user && r.user.type === 'User' && r.user.login !== author)
                .map((r) => r.user.login)
            )];
            core.info(`PR author: @${author}`);
            core.info(`Approving (non-author, human): ${approvers.join(', ') || '(none)'}`);

            // A maintainer is anyone whose repo role is maintain or admin.
            // NOTE: use `role_name`, not `permission`. The legacy `permission`
            // field only returns admin/write/read — a Maintain-role user shows
            // up as `permission: "write"`, so checking `permission` would
            // wrongly reject every maintainer who is not an admin.
            let approvingMaintainer = null;
            for (const login of approvers) {
              try {
                const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  username: login,
                });
                core.info(`  @${login}: permission=${perm.permission} role_name=${perm.role_name}`);
                if (perm.role_name === 'admin' || perm.role_name === 'maintain') {
                  approvingMaintainer = login;
                  break;
                }
              } catch (e) {
                core.info(`  @${login}: permission lookup failed: ${e.status || ''} ${e.message}`);
              }
            }

            if (!approvingMaintainer) {
              core.setFailed(
                `Policy: this PR is awaiting approval from a maintainer ` +
                `(a collaborator with the Maintain or Admin role).\n` +
                `Bot/AI approvals and the author's own approval do not count.\n` +
                `This is a policy gate, not a CI failure. See docs/policies/maintainer-review-gate.md.`
              );
            } else {
              core.info(`✅ Maintainer @${approvingMaintainer} (Maintain+) approved this PR.`);
            }
